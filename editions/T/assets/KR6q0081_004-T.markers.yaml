  - {type: variant, offset: 444, length: 91, content: 仰山既得遂焚之。源一日又謂仰山曰。向所傳圓相。宜深祕之。仰曰。燒却了也。源云。此諸祖相傳至此。何乃燒却。仰曰。某一覽已知其意。能＝但ィ【原】能【大】，但【校異-原】能但用〔始〕ィ－【原】始【大】，〔－〕【校異-原】始得不可執本也。源曰。於子即得。來者如何。仰曰。和尚若要重錄一本。仰乃重錄呈似。一無差失, 甲: 遂將其本過與山山接得一覽便將火燒却耽源一日問前來諸相甚宜秘惜山曰當時看了便燒却也源曰吾此法門無人能會唯先師及諸祖師諸大聖人方可委悉子何得焚之山曰慧寂一覽已知其意但用得不可執本也源曰然雖如此於子即得後人信之不及山曰和尚若要重錄不難即重集一本呈上更無遺失源曰然}
