  - {type: variant, offset: 1536, length: 329, content: 第八識亦名含藏識。若是悟底人。六七因中轉。五八果位圓。六識轉為妙觀察智。反觀第八識。為不動智。空無內外名大圓鏡智。即一體也。平等性智總號也。以妙觀察智。收前六根六塵六識十八界乃至八萬四千塵勞。轉為成所作智。總歸大圓鏡智。即一體也。第五識乃記持識。轉為成所作智。成所作智。轉入妙觀察智。妙觀察智。轉入平等性智。平等性智。轉入大圓鏡智。即一體也。是相宗師。若有問難能轉者。即轉在那箇識一作若有問難能轉者阿那箇識按楞伽經云。佛誡大慧。初中後夜。常以妙觀察智。當淨現流。識轉六根。為成所作智。如手仰時不應問覆手何在。亦如氷為水時不即有異。故云。煩惱即菩提。據百法惟識二論。但取其義。莫著言句也。六祖大師偈云。大圓鏡智性清淨。平等性智心無病【CB】，無【大】病TW48n2006_p0323a13T39n1791_p0444a16無。妙觀察智見非功。成所作智同圓鏡。五八六七果因轉。但轉其名無實性。若於轉處不留情。繁興永處那伽定六妙七平因地轉五成八大果中圓, 甲: ''}
