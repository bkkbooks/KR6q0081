body:
  text: 宗門雜錄巖頭三句咬去咬住欲去不去欲住不住或時一向不去或時一向不住師上堂云大凡唱教從無欲中流出三句秖是理論咬去咬住欲去不去欲住不住或時一向不去或時一向不住並不知方所明眼漢沒窠臼突然地若論戰也箇箇須是咬猪狗手段若未透未明亦須得七八分方可入作若從來眼目彌梨麻囉且莫亂呈懵袋錯槌折爾腰莫言不道按岩頭三句咬去咬住是一欲去不去欲住不住是一或時一向不去或時一向不住是一舊本以咬去為一咬住為一欲去不去欲住不住為一而更不顧有或時一向不去或時一向不住之句誤矣今既正之又略舉上堂為據汾陽五門句石門錄中未見有此答僧問如何是入門句汾云遠客投知己暫坐笑吟吟石門聰云六親不相識口中道遠來又云瞎如何是門裏句汾云四相排班立凝情望聖容門云密室不通風獨自歸家坐又云收又云賓中主如何是當門句汾云坐斷千差路舒光照萬機門云開門不扄戶按劍看四方又云斬又云主中主如何是出門句汾云舉目望江山遍界無相識門云威儀不整望長安又云貶如何是門外句汾云樵子愛荒郊騎牛常扣角門云威儀濟濟向長安又云賓中賓肇論四不遷古德着語旋嵐偃嶽而常靜與者裏沒交涉江河競注而不流水洒不著野馬飄鼓而不動風吹不入日月歷天而不周光明無背面巖頭四藏鋒四藏鋒者師所立也謂就事者全事也就理者全理也入就者理事俱也出就者理事泯也後之學者不根前輩所立之意易就為袖使晚生衲子疑宗師袖中有物出入而可示之也故不得不詳審古德頌附達觀頴運水搬柴不是塵頭頭全現法王身扁舟蕩漾滄溟外巨浪如山湧白銀就事就事藏鋒事獨全不於理上取言詮錦鱗若不吞香餌擺尾搖頭戲碧川就事全身直下露堂堂妙體繇來不覆藏觸處現成誰辨的塵塵俱放白毫光就理就理藏鋒理最微豈從事上立毫釐新羅鷂子飛天外肯搦林間死雀兒就理全機電卷幾人知眨上眉毛已是遲覿面不知開寶藏躊躇門外草離離入就入就藏鋒理事該碧潭風起震雲雷禹門三月桃花浪戴角擎頭免曝腮入就凜凜威光滿世間法王號令合當然門前萬古長安道一舉鵬搏萬里天出就出就藏鋒理事忘長天赫日更無妨雷公電母分明說霹靂聲中石火光出就宗門三印石門聰玉泉達一印印空門云舌柱上齶泉云萬象收歸古鑑中一印印水門云說話對聾人泉云秋蟾影落千江裏一印印泥門云頭上喫棒口裏喃喃泉云好看文彩生時雪竇顯頌印空印水印泥炳然字義還迷黃頭大士不識敢問誰得親提印泥印空印水匝地寒濤競起其中無限麟龍幾處爭求出嘴印水印泥印空衲子不辨西東撥開向上一竅千聖齊立下風黃檗初印泥印水印空四方八面玲瓏大海龍吟霧起高山虎嘯生風印空印水印泥高低物物皆齊若識炳然文釆不妨南北東西印泥印空印水雷電風雲四起乘時直透龍門切忌曝腮燒尾雲峯悅一印印泥賢愚共知挗轉鼻孔頂上金槌一印印水徒張唇嘴未涉流沙洪濤競起一印印空明月清風爍迦羅眼齋後之鐘三朝王子汾陽昭五祖演翠巖峰僧問王子未登朝時如何汾云六宮歌雪曲八國聽韶音祖云逢人當問路巖云深宮雖不出化外已傳芳王子正登朝時如何汾云玉蠒不彰文萬邦咸稽首祖云天下太平巖云兩班依玉殿十道盡來朝王子登朝後如何汾云素服問田翁遍界無相識祖云誰論好醜巖云漁樵歌滿路野老唱豐年汾陽頌三朝王子貴兼尊今古傳聞孰可分八國六宮全美化汾陽的印莫紛紜南明慎和尚師子話報恩從附僧問師子未出窟時如何明云清風匝地恩云鋒鋩難繫出窟後如何明云群狐腦裂恩云藏身無路欲出未出時如何明云嗄恩云命若懸絲南明頌兀坐如痴似不能驀然翻轉便掀騰百年妖怪皆潛伏深隱亂山千萬層一聲哮吼震乾坤百獸群中喪膽魂㵎水逆流山影轉眼花空際亂紛紛欲出未出孰能知踞地翻身也大奇千手大悲難摸𢱢從教千古眾人疑長蘆祖印福寶劍話天柱靜翠巖芝承天宗僧問寶劍未出匣時如何印云澁柱云如今朝代無人問朝一作昭巖云切忌道著宗云寒光射斗牛出匣後如何印云利柱云萬里山河道太平巖云天魔膽裂宗云千兵易得一將難求智門祚蓮花語天柱靜慈明圓圓鑑遠僧問蓮花未出水時如何祚云蓮花柱云根深蓮蒂經殘雨明云水深蓋不得鑑云焦磚打著連底凍出水後如何祚云荷葉柱云水僊頭上實希奇明云不礙往來看鑑云揚瀾左䗍無風浪起開後如何明云南北馨香結子後如何明云餵魚餵鱉雪竇頌蓮華荷葉報君知出水何如未出時江北江南問王老一狐疑了一狐疑風穴沼古鏡話慈明圓翠巖芝洞山聰僧問古鏡未磨時如何穴云天魔膽喪明云新羅打鼓巖云照破天下髑髏山云此去漢陽不遠磨後如何穴云軒轅當道明云西天作舞巖云黑似漆山云黃鶴樓前鸚鵡洲五祖演僊陀婆話僧問王索僊陀婆時如何祖云七穿八穴如何是王索僊陀婆祖云鸞駕未排先號令如何是僊陀婆祖云眼瞤耳熱僧禮拜祖云點鏡清問風穴六刮別峰答附如何是就毛刮塵穴云葉落不煩人掃去自有清風為掃來峯云寒毛卓竪如何是就皮刮毛穴云呼吸縱饒幽谷響尋真那得遇當人峯云落處不停誰解看如何是就肉刮皮穴云卸下直教天帝肯那吒太子不容君峯云頻看紅爛處暢殺子平生如何是就骨刮肉穴云醍醐既消身病愈性海玄途不假舟峯云破也墮也如何是就髓刮骨穴云釋迦親遇然燈佛授記不聞說法音峯云手不及處爭著力只如髓又如何刮穴云設使空花結空果木馬那教天馬追峯云賊入空城五宗問答僧問如何是臨濟下事五祖演云五逆聞雷禾山云照用齊行正堂辯云我終不向爾道護國元云殺人不眨眼雪堂行云六合遭塗炭雲門宗祖云紅旗閃爍山云理事俱備堂云木馬上金梯國云頂門三眼耀乾坤雪云千波影裏卓紅旗溈仰宗祖云斷碑橫古路山云暗機圓合堂云目前無異路國云推不向前約不退後雪云無角鐵牛眠少室曹洞宗祖云持書不到家山云偏正叶同堂云鶴宿梧枝國云手執夜明符幾箇知天曉雪云當頭不犯法眼宗祖云巡人犯夜山云何止惟心堂云切忌違時失候國云箭鋒相值不相饒雪云自折合取寶鋒慈鑒頌銅頭鐵額百家冤一喝雙分體用全三尺吹毛定寰宇臨行滅向瞎驢邊臨濟三句都將一串穿等閑挂向御樓前幾多行客眼定動東海鯉魚飛上天雲門一箇撒開千萬箇簸箕解說無生話草堂睡起嘴盧都寂子要須原夢破溈仰紫庭黃閤帶春溫寢殿無人侍至尊長愛百司分職處玉鞭敲鐙出金門曹洞溪光野色浸樓臺一笛遙聞奏落梅風送斷雲歸嶺去月和流水過橋來法眼圓悟五家宗要全機大用棒喝交馳劍刀上求人電光中垂手臨濟北斗藏身金風體露三句可辨一鏃遼空雲門君臣合道偏正相資鳥道玄途金針玉線曹洞師資唱和父子一家明暗交馳語默不露溈仰聞聲悟道見色明心句裏藏鋒言中有響法眼五家改聲換調展托妙門易俗移風千方百面盡向無中唱出曲為初機若是俊流不留朕跡掀翻露布截斷葛藤然則千兵易得一將難求入草尋人聊通一線機前有準擬向則乖句下無私動成窠臼靈鋒寶劍覿面堂堂滯殼迷封不堪種草楊無為頌五宗正法眼藏瞎驢邊滅黃檗老婆大愚饒舌臨濟玉馬上金梯胡人白晝迷直饒機掣電也是鈍根師雲門長一劃短短一劃長曲直方圓徵應宮商江邊𨫼餅無人買空使胡僧笑一場溈仰丹山鸞鳳來阿閣祕殿簫韶奏九成野老不知黃屋貴六街猶聽靜鞭聲曹洞日煖花爭發林深鳥不驚漁舟過南岸潮打石頭城法眼三種法界古德佛未出世時如何天下太平出世後如何特地一場愁出與未出時如何知恩者少負恩者多如何是法身體山花開似錦㵎水綠如藍如何是法身用夜坐連雲石春栽帶雨松如何是法身柳色黃金嫩梨花白雪香五眼如何是肉眼憎愛何足貴貪嗔事轉多如何是天眼恢恢常不漏歷歷太分明如何是慧眼金地遙招手江陵暗點頭如何是法眼青山常不露遍界不曾藏如何是佛眼慈悲利一切方便有多門三寶如何是佛何處不稱尊如何是法車不橫推理無曲斷如何是僧閑持經卷倚松立借問客從何處來拄杖話如何是爾有拄杖子碁逢敵手難藏行如何是爾無拄杖子琴遇知音始好彈如何是拄杖子扶過斷橋水伴歸明月村句意句到意不到古㵎寒泉湧青松帶露寒意到句不到石長無根草山藏不動雲意句俱到天共白雲曉水和明月流意句俱不到青天無片雲綠水風波起六祖問答達磨一隻履九年冷坐無人識五葉花開遍界香又云踏破銕圍山二祖一隻臂看看三尺雪令人毛骨寒又云提携天下三祖一罪身覓之不可得本自無瑕纇又云揑目強生花四祖一隻虎威雄震十方聲光動寰宇又云眼光百步威五祖一株松不圖標境致且要壯家風六祖一張碓踏著關棙子方知有與無十無問答無為國高臥羲皇上行歌帝舜時無星秤斤兩甚分明無根樹不假東皇力常開優鉢花無底鉢托來藏日月放下貯乾坤無絃琴不是知音莫與彈無底船空載月明歸無生曲一曲兩曲無人會雨過夜塘秋水深無孔笛等閑吹一曲共賞太平時無鬚鎖掣開難動手合定不通風又云金槌擊不動無底籃能收四大海包括五須彌一喝分五教新增淨因蹣庵成禪師同法真圓悟慈受并十大法師齋於太尉陳公良弼府第時徽宗私幸觀其法會善華嚴者對眾問諸禪師曰吾佛設教自小乘至圓頓掃除空有獨證真常然後萬德莊嚴方名為佛禪家一喝轉凡成聖與諸經論似相違背今一喝若能入五教是為正說若不能入是為邪說諸禪師顧成成曰如法師所問不足諸大禪師之酬淨因小長老可以使法師無惑也成召善善應諾成曰法師所謂佛法小乘教者乃有義也大乘始教者乃空義也大乘終教者乃不有不空義也大乘頓教者乃即有即空義也一乘圓教者乃不空而不有不有而不空義也如我一喝非惟能入五教至於百工伎藝諸子百家悉皆能入成乃喝一喝問善曰還聞麼善曰聞成曰汝既聞則此一喝是有能入小乘教成須臾又召善曰還聞麼曰不聞成曰汝既不聞則適來一喝是無能入始教成又顧善曰我初一喝汝既道有喝久聲消汝復道無道無則元初實有道有則於今實無不有不無能入終教成又曰我有一喝之時有非是有因無而有無一喝之時無非是無因有故無即有即無能入頓教成又曰我此一喝不作一喝用有無不及情解俱忘道有之時纖塵不立道無之時橫遍虛空即此一喝入百千萬億喝百千萬億喝入此一喝是能入圓教善不覺身起於坐再拜於成之前成復為善曰非唯一喝為然乃至語默動靜一切時一切處一切物一切事契理契機周遍無餘於是四眾歡喜聞所未聞龍顏大悅謂左右侍臣曰禪師有如此玄談妙論太尉啟曰此乃禪師之餘論耳禪林方語新增蠟人向火大象渡河趁狗跳牆德山羅漢封后先生徐六檐板清平渡水把髻投衙半夜教化金山塼岸質庫典牛木匠檐枷嘉州石像湖南長老檐枷過狀矮子泥壁常州打耶濶角水牛尼寺裏髮青平賣油臘月扇子急水打毬鞏縣茶瓶澧州魚羹水浸金山石人腰帶昌州海棠簡州石匠雲居羅漢鳳林吒之紙馬入火張良受書太公釣魚梁山頌子猫兒帶槌李靖三兄乞兒拄杖狗咬枯骨波斯持呪新昌石佛馬喫菜子矮子看戲黃犬渡河兔子望月羅公照鏡波斯落水蕭何制律驢唇先生新羅草鞋矮子渡河茆山土地雲居土地道士打槌秀才使牛壁上碁盤