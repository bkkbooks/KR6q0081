賸宗旨果在是乎古人之句死句也而足為活人之具句非死活也不則人死句死淳熙間越山有昭晦巖者裒類五宗機語之要曰人天眼目衲子到今傳抄人有其書徒珍藏如左券魚魯之殊差之不理而互有增損糅雜獨未知初出之本果何如也余病其然輟應酬之冗蒐酌而是正之稍得其所要俾後進知從上宗門爪牙之為人蓋如此既而自囅曰言句窠窟今時學者之大病也竊以訓徒不攻其所重而反以益之是壅其病蔕也然既病矣即此而藥之顧所用何如且宗旨果不在是乎若吾儕由此而益明夫宗猷不讓於古豈不是以眼目夫人天哉因書其後時寶祐歲次戊午休夏後五日慈雲住山物初大觀序是書之所由作者備見於晦岩物初兩翁序跋矣雖然趙宋全盛之時南詢衲子傳寫而非無烏焉成馬之誤爰有了郜禪人銳意克正始自傳燈以下至於五家宗派尊宿別錄莫不傍羅曲探點對校讎遂成真本所謂孟氏之功不在禹下者乎淨智道人希顏慕藺命工鏤板以壽其傳其用心亦可謂勤矣學者儻思所以扁曰人天眼目則功不浪施耳乾元癸卯正月八日挂堂叟瓊林記初祖老胡多事向西來優鉢羅花火裏開却是梁王贏一著長蘆水急放船回二祖小林面壁太多言接得門人一臂全京洛至今三尺雪天寒何止普通年三祖𤅬溪水碧天柱峯高洞然明白不隔絲毫由來生計平如掌後代兒孫弄海潮四祖慈雲之塔大醫之師瞻之仰之雙峯巍巍懶融不得西天鉢直付黃梅路上兒五祖栽松何老傳衣何少前身後身一夢兩覺白玉花開峯頂頭明月千年冷相照六祖石墜腰間舂碓鳴老盧便重不便輕黃梅衣鉢雖親得猶較曹溪數十程北宗鑑上時時拂舊痕鳥啼花笑幾回春白蓮峯頂無消息鐵鉢輸他踏碓人栽松道者日出而作栽松為樂昔栽幾何今滿巖壑白頭人去小兒歸笑倒林梢千歲鶴牛頭紫氣氤氳透白雲因逢宗匠指迷津啣花百鳥空惆悵不見庵中舊主人永嘉了知生死不相關不到曹溪也是閑剛被老盧延一宿重教言句落人間雲門輥出木毬迷了眼借婆裙子拜婆年一瓢惡水猶嫌少欠負蒲鞋舊價錢雪竇摩醯四日混沌入竅尺短寸長一多二少雲去雲來日月交照拈花了也不勞微笑天衣殘年七十九坐道場棘曲松道山高水長兩笠烟簑人不識一聲秋笛落瀟湘大陽狸奴白牯問崑崙金鎖無鬚密閉門如意寶珠沈海底隣家收得付兒孫投子一隻履兩牛皮金烏啼處木鷄飛半夜賣油翁發笑白頭生得黑頭兒雲峯真不掩偽曲不藏直祖師冤魔人天宿德二千八百顆明珠三生藏裏人誰識黃龍佛手驢脚生緣纏縛雲中老鶴唳三聲海底鯉魚生兩角白雲楊岐石牛先生一犢或觸清風或呼幽谷轉方作圓分三成六白雲山下草綿綿一度春來一度緣鼓山珪十無頌無影樹秀發春光搖劫外根苗曾不染塵泥森森翠幹雲長掛密密寒枝鳥莫棲曉日不明花蓊欝秋風難擺韻長凄栽培肯向無何有不落青黃鎮四時無孔鎚威音那畔曾拈得袖裏密藏非黑白三關擊碎浪濤平萬法鎚開天地窄團團覿面露規模了了圓成無比格高提祖印發光寒直得毘耶口掛壁無孔笛一曲風前格調高金簫玉管謾徒勞木人奏得碧雲合石女吹回煖氣多清韵逈然超世界妙音忘聽了秋毫相逢若遇知音者吹起儂家劫外歌無縫塔團欒佛眼不能窺底事巍巍聖莫知香霧幾重藏不得寒光一點照無時髑髏識盡方還爾色相情忘始到伊覿面堂堂難辨的曾郎潦倒號難提無底籃不假工夫造作成功成作略自縱橫死蛇若遇須盛取茶圃全提携便行劫外好將提日月禹門時把摝鯤鯨高懸無影樹頭著莫與盲人打葛藤無鬚鎖拈來切忌兩頭搖覿面機關莫放饒撒手那邊家穩密遲疑只箇路迢遙青霄雲外無關鑰曠劫春回長異苗佛祖口開俱鎖斷不干唇吻始全超無星秤斤兩不留分買賣商量不到莫饒伊定盤光彩星難辨平等權衡數自知聾漠始堪論的當盲人方解整高低閑來收掛乾坤外無限天龍暗蹙眉無底鉢庾嶺全提總謾傳收羅萬法未渾崙擎來應供非干手飽去馳求不點唇餿飯餞羹誰肯著騰今耀古自超倫趙州老漢何施設分付叢林知幾春無絃琴不勞斤斧雕鐫就肯使焦桐假合成絕掛縷絲新格調了無聲響奏玄音有時彈向青霄外幾度閑懸碧洞深惆悵罕逢穿耳客偃溪流水韻沈沈無底船閑橫芳草深深渡祇接中途趨浪流不犯清波還到岸歸乘明月罷垂鉤蘆花深處和雲泊風浪高時任性浮緬想華亭煙雨客幾多聲譽謾悠悠五家要括臨濟南岳馬祖百丈運臨興南穴首山汾慈明南會開二續心出新清端演勤溈仰百丈派出大溈祐香嚴仰山親得紹南塔芭蕉清續傳兒孫未見繼其後曹洞青石藥山雲洞祖雲膺同安丕志附梁山親得大陽玄投子芙蓉淳獨步雲門青石天龍接德山雪峯雲門香林遠北塔雪竇付天衣二本從茲門大顯法眼雪峯傍出玄沙備地藏法眼益尊貴韶國師傳壽與津佛法新羅而已耳
