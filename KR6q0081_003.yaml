body:
  text: 曹洞宗洞山和尚諱良價生會稽俞氏禮五泄山默禪師披剃得法雲巖曇晟禪師初住筠州洞山權開五位善接三根大闡一音廣弘萬品橫抽寶劍剪諸見之稠林妙叶弘通截異端之穿鑿晚得曹山耽章禪師深明的旨妙唱嘉猷道合君臣偏正回互繇是洞上玄風播於天下故諸方宗匠咸共推尊之曰曹洞宗五位君臣僧問曹山五位君臣旨訣山云正位即屬空界本來無物偏位即色界有萬形像偏中正者舍事入理正中來者背埋就事兼帶者冥應衆緣不隨諸有非染非淨非正非偏故曰虛玄大道無著真宗從上先德推此一位最妙最玄要當詳審辨明君為正位臣為偏位臣向君是偏中正君視臣是正中偏君臣道合是兼帶語時有僧出問如何是君云妙德尊寰宇高明朗太虛如何是臣云靈機弘聖道真智利群生如何是臣向君云不墮諸異趣凝情望聖容如何是君視臣云妙容雖不動光燭本無偏如何是君臣道合云混然無內外和融上下平又曰以君臣偏正言者不欲犯中故臣稱君不敢斥言是也此吾法之宗要也因作偈曰學者先須識自宗莫將真際雜頑空妙明體盡知傷觸力在逢緣不借中出語直教燒不著潛行須與古人同無身有事超岐路無事無身落始終大陽頌不立功勳坐廟堂群臣何敢望清光潭潭禁殿尊嚴甚寂寞無人夜未央君文經武緯定中華遍歷階梯贊國家功業已隆加九錫與君神氣看些些臣位尊九五不曾居常與群臣共一途深隱後宮天下治免教夷狄望來蘇君視臣念念輸忠不敢欺頭頭奉重丈夫兒看君千里長安道玉鐙皆趣闕下歸臣向君臣主相忘古殿寒萬年槐樹雪漫漫千門坐掩靜如水只有垂楊舞翠烟君臣道合無中有路透長安劫外靈枝孰敢攀寶殿苔生尊貴重三更紅日黑漫漫總頌問答僧問如何是正中偏汾陽昭云玉兔既明初夜後金雞須唱五更前道吾真云諸子投來見大仙宏智覺云雲散長空後虛堂夜月明翠巖宗云菱花未照前華嚴覺云更深垂却夜明簾如何是偏中正汾云毫末成大樹滴水作江湖吾云萬水千山明似鏡智云白髮老婆羞看鏡巖云團欒無少剩覺云天曉賊人投古井如何是正中來汾云旱地蓮華朵朵開僧云開後如何汾云金蘂銀絲承玉露高僧不坐鳳凰臺吾云皎潔乾坤震地雷智云霜眉雪鬢火中出堂堂終不落今時巖云遍界絶塵埃覺云百卉承春在處開如何是兼中至寂音曰當作偏中至其說在後汾云意氣不從天地得英雄豈藉四時催吾云施設縱橫無所畏智云大用現前不存軌則巖云嚙鏃功前戲巖云雨雪交加無處避如何是兼中到汾云玉女拋梭機軋軋石人打鼓韻鼕鼕吾云黑白未分前已過智云夜明簾外排班早空王殿上絶知音巖云十道不通耗嚴云兩頭截斷無依倚心法雙忘始得玄寂音正五位之訛新添寂音曰道愈陵遲至於列位之名件亦訛亂不次如正中偏偏中正又正中來偏中至然後以兼中到總成五位今乃易偏中至為兼中至不曉其何義耶而老師大衲亦恬然不知怪為可笑也文字禪題雲居弘覺語五位序丹霞淳夫黑白未分難為彼此玄黃之後方位自他於是借黑權正假白示偏正不坐正夜半虛明偏不坐偏天曉陰晦全體即用枯木華開全用即真芳叢不艷摧殘兼帶及盡玄微玉鳳金鸞分疏不下是故威音那畔休話如何曲為今時由人施設略陳管見以示方隅冀諸同心幸毋撫掌五位頌此依僧寶傳作偏中至正中偏三更初夜月明前莫怪相逢不相識隱隱猶懷昔日嫌偏中正失曉老婆尋古鏡分明覿面更無他休更迷頭猶認影正中來無中有路出塵埃但能不觸當今諱也勝前朝斷舌才偏中至兩刃交鋒要回避好手還同火裏蓮宛然自有衝天氣兼中到不落有無誰敢和人人盡欲出常流折合終歸炭裏坐克符道者正中偏半夜澄潭月正圓文殊匣裏青蛇吼驚得毗盧出故園一作故關偏中正演若玉容迷古鏡可笑騎牛更覓牛寂然不動毗盧印正中來鳳竹龍絲坐釣臺高僧不觸當今諱藏却花冠笑一回兼中至鰲怒龍奔九江沸張騫尋得孟津源推倒崑崙絶依倚兼中到龍旗排出御街早略開仙仗鳳樓前尋常却諱當今號汾陽昭汾陽以正中來居首而正中偏次之正中來金剛寶劍拂天開一片神光橫世界晶輝朗耀絶纖埃偏中正看取法王行正令七金千子總隨身猶自途中覓金鏡正中偏霹靂機鋒著眼看石火電光猶是鈍思量擬議隔千山兼中至三歲金毛爪牙備千妖百怪出頭來哮吼一聲皆伏地兼中到大顯無功休作造木牛步步火中行真箇法王妙中妙五位參尋切要知絲毫才動即相違金剛透匣誰能用惟有那吒第一機舉目便令三界靜振鈴還使九天歸正中妙叶通回互擬議鋒鋩失却威總頌慈明總頌偏中歸正極幽玄正去偏來理事全須知正位非言說朕兆依稀屬有緣兼至去來興妙用到兼何更逐言詮出沒豈能該世界蕩蕩無依鳥道玄浮山遠正中偏空劫迢迢本寂然金剛際下翻筋斗掌上靈機遍大千偏中正浩浩塵中劫清淨臨岐撒手便回途無影堂前提正令正中來頂後圓光耀古臺雖然照徹人間世不犯鋒鋩絶點埃兼中至妙用縱橫休擬議始終交戰自玄玄壁立神鋒皆猛利兼中到格外明機長節操了知萬彙不能該誰能更守於玄奧草堂清正中偏丫角崑崙空裏眠石女機梭聲軋軋木人舞袖出庭前偏中正澄潭印出桂輪影人人盡向影中圓影滅潭枯誰解省正中來火裏蓮花朵朵開根苗豈是尋常物大用非同應世材兼中至交互機鋒絶忌諱丈夫彼彼逞英雄點著不來成粉碎兼中到鐵牛喫盡欄邊草却問牧童何處居指點東西得一寶宏智覺正中偏霽碧星河冷浸天夜半木童敲月戶暗中驚破玉人眠偏中正海雲依約神仙頂婦人鬢髮白垂絲羞對秦臺寒照影正中來月夜長鯨蛻甲開大背摩天振雲翼翔遊鳥道䫫難該兼中至覿面不須相忌諱風化無傷的意玄光中有路天然異兼中到斗柄橫斜天未曉鶴夢初醒露葉寒舊巢飛出雲松倒自得暉正中偏混沌初分半夜前轉側木人驚夢破雪蘆滿眼不成眠偏中正寶月團團金殿冷當明不犯暗抽身回眸影轉西山頂正中來帝命傍分展化才杲日初升沙界靜靈然曾不帶纖埃兼中至長安大道長遊戲處處無私空合空法法同歸水歸水兼中到白雲斷處家山好撲碎驪龍明月珠崑崙入海無消耗明安五位賓主見明安別録安曰正中偏乃垂慈接物即主中賓第一句奪人也偏中正有照有用即賓中主第二句奪境也正中來乃奇特受用即主中主第三句人境俱奪也兼中至乃非有非無即賓中賓第四句人境俱不奪也兼中到出格自在離四句絶百非妙盡本無之妙也洞山功勳五位并頌向奉功共功功功僧問師如何是向師曰喫飯時作麼生又云得力須忘飽休糧更不饑大慧云向時作麼生向謂趣向此事答喫飯時作麼生謂此事不可喫飯時無功勳而有間斷也聖主繇來法帝堯御人以禮曲龍腰有時鬧市頭邊過到處文明賀聖朝如何是奉師曰背時作麼生又曰只知朱紫貴辜負本來人大慧云奉乃承奉之奉如人奉事長上先致敬而後承奉向乃功勳之所立才向即有承事之意故答背時作麼生謂此事無間斷奉時既爾而背時亦然言背即奉之義蓋奉背皆功勳也淨洗濃粧為阿誰子規聲裏勸人歸百草落盡啼無盡更向亂山深處啼如何是功師曰放下鋤頭時作麼生又曰撤手端然坐白雲深處間大慧云功即用也答放下鋤頭時作麼生把鋤頭言用放下鋤頭是無用師之意謂用與無用皆功勳也枯木花開劫外春倒騎玉象趁麒麟而今高隱千峯外月皎風清好日辰如何是共功師曰不得色又曰素粉難沈跡長安不久居大慧云共功謂法與境敵答不得色乃法與境不得成一色正用時是顯無用底無用即用也若作一色是十成死語洞山宗旨語忌十成故曰不得色乃活語也衆生諸佛不相侵山自高兮水自深萬別千差明底事鷓鴣啼處百花新如何是功功師曰不共又曰混然無諱處此外更何求大慧云功功謂法與境皆空謂無功用大解脫答不共乃無法可共不共之義全歸功勳邊如法界事事無礙是也爾面前無我我面前無爾所以夾山道此間無老僧目前無闍黎是也如此之說皆趣向承奉於日用四威儀內成就世出世間無不周旋謂之功勳五位也頭角才生已不堪擬心求佛好羞慚迢迢空劫無人識肯向南詢五十三大慧既說功勳五位乃云爾道他古人意果如是乎若只如此有甚奇特只是口傳心授底葛藤既不如是目道古人意作麼生功勳問答翠巖宗僧問翠巖如何是轉功就位巖云撒手無依全體現扁舟漁父宿蘆花如何是轉位就功巖云半夜嶺頭風月靜一聲高樹老猿啼如何是功位齊施巖云出門不踏來時路滿目飛塵絶點埃如何是功位俱隱巖云泥牛飲盡澄潭月石馬加鞭不轉頭曹山五位君臣圖頌并序夫正者黑白未分朕兆未生不落諸聖位也偏者朕兆興來故有森羅萬象隱顯妙門也白衣雖拜相此事不為奇積代簪纓者休言落魄時子時當正位明正在君臣未離兜率界烏雞雪上行焰裏寒氷結楊花九月飛泥牛吼水面木馬逐風嘶正宮初降日玉兔不能離未得無功旨人天何太遲混然藏理事朕兆卒難明威音王未曉彌勒豈惺惺五位功勳圖正中偏誕生內紹君位向黑白未變時一作未分時偏中正朝生外紹臣位奉露正中來末生隱棲君視臣功無句有句兼中至化生神用臣向君共功各不相觸兼中到內生不出君臣合功功不當頭石霜答五位王子如何是誕生王子霜云貴裔非常種天生位至尊如何是朝生王子霜云白衣為足輔直指禁庭中如何是末生王子霜云修途方覺貴漸進不知尊如何是化生王子霜云政威無比況神用莫能儔如何是內生王子霜云重幃休勝負金殿臥清風大慧云以二分黑一分白圈子為正中偏却來白處說黑底亦不得犯著黑字犯著即觸諱矣洞山頌正中偏三更初夜月明前謂三更是黑初夜是黑月明前是黑是能回互不觸諱也又云以二分白一分黑圈子為偏中正却來黑處說白底不得犯著白字洞山頌失曉老婆逢古鏡不言明與白而言失曉與古鏡是能回互明與白字而不觸諱蓋失曉是暗中之明古鏡亦暗中之明老婆頭白謂言回互白字也又云正中來無中有路出塵埃謂凡有言句皆無中唱出便有挾妙了也無不從正位中來或明或暗或至或到皆妙挾通宗凡一位皆具此五事如掌之五指無缺無剩又云兼中至謂兼白兼黑兼偏兼正而至何謂至如人歸家未到而至別業乃在途為人邊事亦能回互妙在體前又云兼中到謂兼前四位皆挾妙而歸正位謂之折合終歸炭裏坐亦是說黑處而回互黑字故言炭也大慧舉曹山了即曰說理說事教有明文教外單傳直指之道果如是否若果如是討甚好曹山耶五位王子頌石霜諸出題悟本頌誑生內紹嫡生又云正位根本智儲君太子也天然貴胤本非功不假修證本自圓成德合乾坤育勢隆本自尊貴中來始末一期無雜種本無雜念分宮六宅不他宗六根唯以一機軸上和下睦陰陽順前後一際共氣連枝器量同始終無二欲識誕生王子父須知向上更有一人在鶴騰霄漢出銀籠千聖不傳朝生庶生宰相之子已落偏位涉大功勳亦云外紹臣種苦學論情世不群有修有證出來凡事已超倫雖有修有證本自尊貴中來詩成五字三冬雪染污不得筆落分毫四海雲不守住萬卷積功彰聖代大功修證一心忠孝輔明君知有向上人始得奉重鹽梅不是生知得修證還同金榜何勞顯至勳不假修證不待功勳末生有修有證群臣位久棲巖嶽用功夫有修有證草榻柴扉守志孤直是不待功勳一塵不染十載見聞心自委方全肯重一身冬夏衣縑無赤灑灑乾剝剝澄凝愁看三秋思一塵不染清苦高名上哲圖學者可以為王尊貴之事業就巍科酬極志本業成就比來臣相不當途雖然如是功勳不犯化生借位明功將軍位傍分帝化為傳持分佛列祖萬里山河布政威正令當行紅影日輪凝下界從尊貴中來碧油風冷暑炎時正布威時誰敢犯令高低豈廢尊卑奉知有底如解奉重五袴蘇途遠近知為蘇塗炭也妙印手持煙塞靜誰敢當頭當陽那肯露纖機終始功勳不犯內生亦為內紹根本同出誕生同九重深密復何宣無言無說正令當行挂弊繇來顯妙傳曲為今時祇奉一人天地貴奉重內生王子父從他諸道自分權雖然言一用要在一機軸紫羅帳合君臣隔入他無異相體知同一國黃閣簾垂禁制全天下音成正令當行為汝方隅官屬戀正是幼生子遂將黃葉止啼錢不免權此問善權志五位王子頌誕生貴胤生時輪擬空玎璫玉珮處東宮月堂照處朝君父直扣堯階却借功朝生學問詩書德行全金門投策紫薇班台星不自離蓑釣爭得寅昏奉聖顏末生貧來今日極清虛悲喜寥寥一物無便欲升為九苞鳳依稀雲樹月巢孤化生帝命傳來下九天禁城中外化親宣回途復妙持金印正令曾無一字傳內生鳳勢龍驤大丈夫天然尊貴六宮殊苔封古殿無人到造次凡流識得無永嘉欽功勳五位到處相逢元不識有時不識却相逢師襄無目還如見師曠能聰恰似聾向金針密密繡鴛鴦錦縫綿綿玉線長挂向春園人不識引他蜂蝶過來忙奉顏生陋巷不堪憂終日如愚樂自繇謾說坐忘為益矣纍他尼父一場愁功淮南道士著真紅勿謂情忘色是空醮罷玉壇移斗柄步虛一曲對春風共功漢高初起沛豐間三尺龍泉帝業安待得叔孫成禮樂元來不共汝同盤功功寂音說王種內紹外紹寂音曰此如唐郭中令李西平皆稱王然非有種也以勳勞而至焉高祖之秦王明皇之肅宗則以生帝王之家皆有種非以勳勞而至者也謂之內紹者無功之功也先聖貴之謂之外紹者借功業而然故又名曰借句曹山章禪師偈略曰妙明體盡知傷觸力在逢緣不借中雲居弘覺禪師曰頭頭上了物物上通只喚作了事人終不喚作尊貴將知尊貴一路自別曹山三種墮曹山云凡情聖見是金鎖玄路直須回互夫取正命食者須具三種墮一者披毛戴角二者不斷聲色三者不受食稠布衲問披毛戴角是甚麼墮曰是䫫墮問不斷聲色是什麼墮曰是隨墮問不受食是什麼墮曰是尊貴墮乃曰夫冥合初心而知有是䫫墮知有而不礙六塵是隨墮維摩曰外道六師是汝之師彼師所墮汝亦隨墮乃可取食食者正命食也食者亦是就六根門頭見聞知覺只是不被他污染將為墮且不是同也明安曰此三種須明轉位始得一作水牯牛是䫫墮是沙門轉身語是異䫫中事若不曉此意即有所滯直是要爾一念無私即有出身之路大珠和尚因維摩座主問經云彼外道六師是汝之師汝師所墮汝亦隨墮其施汝者不名福田供養汝者墮三惡道謗於佛毀於法不入衆數終不得滅度汝若如是乃可取食今請禪師明為解說大珠曰迷循六根號為六師心外求佛名為外道有物可施不名福田生心受供墮三惡道汝若謗於佛者是不著佛求毀於法者是不著法求不入衆數者是不著僧求終不得滅度是智用現前若如是解者便得法喜禪悅之食二曰不斷聲色是隨墮以不明聲色故隨處墮須向聲色有出身之路作麼生是聲色外一句答聲不是聲色不是色故云不斷指掌當指何掌也三曰不受食是尊貴墮須是知那邊了却來這邊行履不虛此位即墮尊貴矣正命食新添寂音曰瑜伽師地論曰死有三種謂壽盡故福盡故不避不平等故當知亦是時非時死或由善心或不善心或無記心云何壽盡死猶如有一隨感壽量滿盡故死此名時死云何福盡故死猶如有一資具缺故死云何不避不平等故死如世尊說九因九緣未盡壽量而死何等為九謂食無度量食時不宜不消復食生而不吐熟而持之不近醫藥不知於己若損若益非時非量行非梵行此名非時死豫以是觀之乃知時而食即不枉死名正命食黃檗曰今時才出衆來者只欲多知多解廣求文義喚作修行不知多知多解翻成壅塞惟多與兒乳酪消與不消都總不知三乘學道人皆此樣盡名食不消食不消者所謂知解不消皆為毒藥盡去生滅邊收真如之中無此事故以此知曹山貴正命食立三墮不斷聲色墮隨墮尊貴墮新添寂音曰維摩經為壞和合相故應取揣食為不受故應取彼食以空聚想入於聚落所見色與盲等所聞聲與響等所嗅香與風等所食味不分別受諸觸如智證知諸法如幻相無自性無他性本自不生今則無滅此不斷聲色墮所繇立也又曰須菩提不見佛不聞法彼外道六師是汝之師因其出家彼師所墮汝亦隨墮乃可取食此隨墮之所繇立也又曰謗於佛毀於法不入衆數終不得滅度汝若如是乃可取食此尊貴墮之所繇立也豫嘗觀曹山其自比六祖無所愧以其蕩聖凡之情有大方便南泉曰三世諸佛不知有狸奴白牯却知有乃不如曹山止立一墮字耳寂音三墮頌紛然作息同銀碗裏盛雪若欲異牯牛與牯牛何別䫫有聞皆無聞有見元無物若斷聲色求木偶當成佛隨生在帝王家那復有尊貴自應著珍御顧見何驚異尊貴百丈端三墮頌并總著起破襴衫脫下娘生袴信步入荒草忘却長安路䫫秦樓歌夜月魏闕醉春風家國傾亡後鄉關信不通隨獨坐孤峯頂輪蹄絶往還可憐一雙足曾不到人間尊貴雲不戀青山鏡不籠妍醜未透鬼門關逐處成窠臼總一披毛戴角隨䫫自在頭角混泥塵分明露此身緑楊芳草岸何處不稱尊二見色聞聲隨處自在猿啼霜夜月花笑沁園春浩浩紅塵裏頭頭是故人三禮絶百僚尊貴自在畫堂無鎖鑰誰敢跨其門莫怪無賓客從來不見人總頌昨夜荒村宿今朝上苑遊本來無位次何處覓蹤繇三種滲漏師謂曹山曰吾在雲巖先師處親印寶鏡三昧事最的要今以授汝汝善護持無令斷絶遇真法器方可傳授直須祕密不可彰露恐屬流布喪滅吾宗末法時代人多乾慧若要辨驗向上人之真僞有三種滲漏直須具眼一見滲漏機不離位墮在毒海妙在轉位也明安云謂見滯在所知若不轉位即在一色所言滲漏者只是可中未盡善須辨來蹤始得相續玄機妙用二情滲漏智常向背見處偏枯明安云謂情境不圓滯在取舍前後偏枯鑒覺不全是識浪流轉途中邊岸事一作途中未分邊岸事直須句句中離二邊不滯情境三語滲漏體妙失宗機昧終始濁智流轉不出此三種明安云體妙失宗者滯在語路句失宗旨機昧終始者謂當機暗昧只在語中宗旨不圓句句中須是有語中無語無語中有語始得妙旨密圓也泐潭照三滲漏頌天下溪山絶勝幽誰能把手共同遊回頭忽聽杜鵑語笑指白雲歸去休見昔年曾作參玄客遍扣玄關窮要脈更闌墨汁污皂衫說向他人口門窄情木人嶺上輕開口石女溪邊暗點頭堪笑當年李太白夜來還宿釣漁舟語洞山三路接人僧到夾山山問近離甚處僧云洞山夾山云洞山有何言句僧云和尚道我有三路接人夾山云有何三路僧云鳥道玄路展手山云實有此三路那僧云是山云鬼持千里鈔林下道人悲後浮山圓鑑云不因黃葉落爭知是一秋或曰尊宿舉論而曰軌持千里鈔林下道人孤或曰軌持千里鉢林下道人孤曹山三種綱要頌金針雙鎖備挾路隱全該寶印當空妙重重錦縫開敲唱雙行交互明中暗功齊轉覺難力窮忘進步金鎖網鞔鞔金鎖玄路理事俱不涉回照絶幽微背風無巧拙電火爍難追三不墮凡聖又曰理事不涉明安三句安一日示衆吾有三句平常無生句妙玄無私句體明無盡句時有僧問如何是平常無生句安云白雲覆青山青山不露頂如何是妙玄無私句安云寶殿無人空侍立不種梧桐免鳳來如何是體明無盡句安云手指空時天地轉回途石馬出紗籠琅瑘覺答三句海印信答附琊因僧請益次乃曰山僧亦有三句報答大陽僧問如何是平常無生句瑘云言前無的旨句下絶追尋印云三腳蝦蟆背巨鰲如何是妙玄無私句琊云金鳳不棲無影樹玉兔何曾下碧霄印云白雲覆青山如何是體妙無盡句琊云三冬枯木秀九夏雪花飛印云須彌頂上浪滔天琊云將此三句語供養大陽和尚便下座曹山四禁語或謂投子語莫行心處路不挂本來衣何須正任麼切忌未生時門風偈芙蓉楷自得暉古德妙唱不干舌一剎剎塵塵處處談不勞彈指善財參空生也解通消息花雨巖前鳥不銜芙蓉六如如寂滅似無情一句從來本現成舌運廣長元不間雪峯相見望州亭自得古佛巍巍體廣長交光絲網剎塵彰也知不費娘生舌巖桂庭花善舉揚古德死蛇驚出草二日炙風吹草裏埋觸他毒氣又還乖暗地忽然開死口長安依舊絶人來芙蓉七金鞭遙指玉堂寒驚起將軍夜出關三尺鏌鎁清四海攙旗一掃絶癡頑自得死蛇打殺露霜牙無底籃盛臭莫加既是善呼須善遣觸他毒氣喪渾家古德解針枯骨吟三死中得活是非常密用還他別有長半夜髑髏吟一曲氷河發焰却清涼芙蓉八宮漏沈沈夜色深燈殘火盡絶知音木人位轉玉繩曉石女夢回霜滿襟自得功齊功化旨何深豈使膏肓便陸沈父子不傳真祕訣解針枯骨作龍吟古德鐵鋸舞三臺四不落宮商調誰人和一場伯牙何所措此曲舊來長九鐵牛無角臥山坡鞭起如飛見也麼鬧市橫騎人不會擡眸鷂子過新羅自得乾闥婆王鼓似雷靈山獻樂未空回海波洶洶須彌震何妨鐵鋸舞三臺古德古今無間宏智録洎諸家語不見有古今無間之題獨芙蓉有此頌五一法元無萬法空箇中那許悟圓通將謂少林消息斷桃花依舊笑春風五轉位古德立題自得暉頌匣內青蛇吼十寶劍橫斜天未曉洗清魔佛逼人寒匣中隱隱生光處衲子徒將正眼看金針去復來十一清虛大道長安路往復何曾有間然暗去明來鋒不露渠儂初不墮中邊秦宮照膽寒十二巖房闐寂冷如氷妙得真符處處靈轉側無依功就位回頭失却楚王城五天銀燭輝十三五天皎皎玉輪孤一點光明分鑑湖間步却來遊幻海十方沙界大毗盧深巖藏白額十四白額深藏烟霧昏異中來也自驚群草深直下無尋處觸著輕輕禍到門曹洞機汾陽十五樓閣千家月江湖萬里秋蘆花無異色白鳥下汀洲宗旨古德十六洞下門庭理事全白雲巖下莫安眠縱饒枯木生花去反照荒郊不直錢古德分三種功勳新增正位一色無影林中鳥不棲空階密密向邊遲寒巖荒草何曾緑正坐堂堂失路迷大功一色白牛雪裏覓無蹤功盡超然體浩融月影蘆花天未曉靈苗任運剪春風今時一色髑髏識盡勿多般狗口才開落二三日用光中須急薦青山只在白雲間宏智四借頌借功明位十七蘋末風休夜未央水天虛碧共秋光月船不犯東西岸須信篙人用意良借位明功十八六戶虛通路不迷太陽影裏不當機縱橫妙展無私化恰恰行從鳥道歸借借不借借十九識盡甘辛百草頭鼻無繩索得優游不知有去成知有始信南泉喚作牛全超不借借二十霜重風嚴景寂寥玉關金鎖手慵敲寒松盡夜無虛籟老鶴移棲空月巢曹洞門庭曹洞宗者家風細密言行相應隨機利物就語接人看他來處忽有偏中認正者忽有正中認偏者忽有兼帶忽同忽異示以偏正五位四賓主功勳五位君臣五位王子五位內外紹等事偏正五位者正中偏者體起用也偏中正者用歸體也兼中至體用並至也兼中到體用俱泯也四賓主不同臨濟主中賓體中用也賓中主用中體也賓中賓用中用頭上安頭也主中主物我雙忘人法俱泯不涉正偏位也功勳五位者明參學功位至於非功位也君臣五位者明有為無為也王子五位者明內紹本自圓成外紹有終有始也大約曹洞家風不過體用偏正賓主以明向上一路要見曹洞麼佛祖未生空劫外正偏不落有無機要訣山堂淳新豐一派荷玉分流始因過水逢渠妙見無情說法當今不觸展手通玄列五位正偏分三種滲漏夜明簾外臣退位以朝君古鏡臺前子轉身而就父雪覆萬年松徑夜半正明雲遮一帶峯巒天曉不露道樞綿密智域囦深默照空劫已前湛湛一壺風月坐徹威音那畔澄澄滿目烟光不萌枝上花開無影樹頭鳳舞機絲不挂箇中雙鎖金針文彩縱橫裏許暗穿玉線雙明唱起交鋒處知有天然兼帶忽來枯木上須能作主不存正位那守大功及盡今時寧容尊貴截斷情塵見網掣開金鎖玄關妙協全開歷歷䫫中混跡平懷常實明明炭裏藏身卷舒不落功勳來去了為變易欲使異苗蕃茂貴在深固靈根若非柴石野人爭見新豐曲子柴石野人浮山圓鑑之別號也古德綱宗頌荊棘叢生三二五烟雲罩徑孰能尋烏雞冒雨衝陽焰赤蝀穿樓和啞啞當音厄笑語聲易曰笑言啞啞赤蝀穿樓和啞音此無語中有語也人多作瘖啞之啞非也音廣澤蘆花藏雪密收綸釣艇弄灣深當軒黯黯無秦鏡散髮斜眉下翠岑寶鏡三昧如是之法佛祖密付汝今得之宜善保護銀碗盛雪明月藏鷺䫫之弗齊混則知處意不在言來機亦赴動成窠臼差落顧佇背觸俱非如大火聚但形文彩即屬染污夜半正明天曉不露為物作則用拔諸苦雖非有為不是無語如臨寶鏡形影相覩汝不是渠渠正是汝如世嬰兒五相完具不去不來不起不住婆婆和和有句無句終不得物語未正故重離六爻偏正回互疊而為三變盡成五如荎草味如金剛杵正中妙挾敲唱雙舉通宗通途挾帶挾路錯然則吉不可犯忤天真而妙不屬迷悟因緣時節寂然昭著細入無間大絶方所毫忽之差不應律呂今有頓漸緣立宗趣宗趣分矣即是規矩通宗趣極真常流注外寂中搖繫駒伏鼠先聖悲之為法檀度隨其顛倒以緇為素顛倒想滅肯心自許要合古轍請觀前古佛道垂成十劫觀樹如虎之缺如馬之馵以有下劣寶几珍御以有驚異狸奴白牯羿以巧力射中百步箭鋒相直巧力何預木人方歌石女起舞非情識到寧容思慮臣奉於君子順於父不順非孝不奉非輔潛行密用如愚若魯但能相續名主中主
