body:
  text: 宗門雜録拈花王荊公問佛慧泉禪師云禪家所謂世尊拈花出在何典泉云藏經亦不載公曰余頃在翰苑偶見大梵天王問佛決疑經三卷因閲之經文所載甚詳梵王至靈山以金色波羅花獻佛舍身為床座請佛為衆生說法世尊登座拈花示衆人天百萬悉皆罔措獨有金色頭陀破顏微笑世尊云吾有正法眼藏涅槃妙心實相無相分付摩訶大迦葉此經多談帝王事佛請問所以祕藏世無聞者三身新添三身謂法報化也法身毗盧遮那此云遍一切處報身盧舍那此云淨滿化身釋迦牟尼此云能仁寂默在衆生身中即寂智用也寂即法身智即報身用即化身事苑金光明最勝王經云一切如來有三種身具足攝受阿耨菩提化身者如來昔在修行地中為諸衆生修種種法得自在力隨衆生意隨衆生界現種種身是名化身應身者謂諸如來為諸菩薩說於真諦令其解了生死涅槃是一味故為除身見衆生怖畏權喜故為無邊佛法而作本故如實相應如如如如智本願力故具三十二相八十種好項背圓光是名應身法身者為除煩惱等障為具諸善法故惟有如如如如智是名法身前二種身是名假有後第三身是真實有為前二身而作根本何以故離法如如離無分別智一切諸佛無有別法復次諸佛利益自他自利益者是法如如利益他者是如如智又纓珞經云五分法身以識性別戒香攝身定香攝意慧香攝亂解慧攝倒見度知攝無明是五分香纓珞其身四智新添大圓鏡智如大圓鏡現衆色像平等性智觀一切法悉皆平等妙觀察智善觀諸法無礙而轉成所作智成本願力所應作事故轉八識而成四智妙藏詮注云佛轉八識而成四智者用八為大圓鏡智七為平等性智六為妙觀察智前五為成所作智識惟分別智能決斷大乘莊嚴論云轉八識成四智束四智具三身古德云眼等五識為成所作智意為妙觀察智化身攝末那為平等性智報身攝阿賴耶為大圓鏡智法身攝智通禪師讀楞伽經至千餘遍而不會三身四智詣曹溪問六祖祖曰三身者清淨法身汝之性也圓滿報身汝之智也千百億化身汝之行也若離本性說三身即名有身無智若悟三身無有自性即名四智菩提聽吾偈曰自性具三身發明成四智不離見聞緣超然登佛地吾今為汝說諦信永無迷莫學馳求者終日說菩提通曰四智之義可得聞乎祖曰既會三身便明四智若離三身便談四智此名有智無身也即此有智還成無智復說偈曰大圓鏡智性清淨八平等性智心無病七妙觀察智見非功六成所作智同圓鏡五五八果六七因果因轉但用名言無實性轉名不轉體若於轉處不留情繁興永處那伽定傳燈眼耳鼻舌身意六根六塵六識五識轉成所作智般若經云六根六塵成十二處添六識和合為十八界起信論云以四種法熏習義一淨謂真如二染謂無明三妄心謂業識四妄塵謂六塵楞嚴云六識造業所招惡報從六根出也華嚴云眼耳鼻舌身心意諸情根以此常流轉而無能轉者起信又云三界虛僞惟心所作離心則無六塵境界也毗婆沙論問曰心意識有何差別答曰無有差別即心是意意即是識皆同一義如火灸亦名焰亦名熾般若又曰若如實知自性皆空是為能學六根六塵六識者也祖師云遍現俱該沙界收攝在一微塵識者謂之佛性不識喚作精魂然雖如是蹉過者極多錯會者不少第七末那識轉平等性智楞伽云末那者此云染污意恆審思量故亦名傳送識佛與大惠謂廣說有八略說有二內現識計為我屬賴耶外分別事識計為我屬前六識真即識實性亦屬賴耶淨分故有麁細者謂三細六麁麁細二識者皆依無明住地而起以根本無明動彼靜心而起細識依此細識轉起麁心以無明為本依無明為因生三細不相應心依境界為緣生三麁相應心故云麁細二識各具二因方得生住現識者起信云不相應心也依不思議熏故得生依不思議變故得住此現識所現境界動彼心海起諸事識之浪也分別事識者起信云相應心也依境界故得生依海心故得住也此一識者皆是無明熏習真如成染緣起也論曰當知無明能主一切染法一切染法皆是不覺相故諸經要集云識自下上至臍已上滅者生人中上至心滅者不失人身上至頭面滅者生天至頂滅者永斷輪回自上下至腰滅者鬼趣下至足滅者地獄論曰若離妄念則無一切境界之相惟一真心矣八阿賴耶識轉大圓鏡智宗鏡云第八識多異熟性故亦名含藏識亦名八王子亦名八解脫亦名八丈夫總有四八三十二相此是果相因智報德七八二識不相離解深密經云此八識能發起前六轉識故第八識謂前世中以善不善業為因招感令生第八異熟心是果此阿賴耶者即是真心不守自性隨染淨緣不合而合能含藏一切真俗境界故名含藏識如明鏡不與影象合而含影象亦名如來藏識伽陀云諸法於藏識識於法亦爾更互為因相亦互為果相楞伽云若不著二乘外道諸見方能如實修行摧破他論惡見及舍我執等能以妙慧所依識者即四智轉八識也入如來自證地者言與諸佛同得同證也楞伽經佛語大惠云然彼諸識不作是念我等同時展轉為因而於自心所現境界分別執著俱時之起無差別相各了自境注云彼諸識等各了自境者此名八識俱能分別自分境故不知惟是自心妄現也謂色是眼識境乃至賴耶見分是第七識境根身種子器界是藏識境然此八識離如來藏無別自體以衆生不知故執為八識之名諸佛證得之故能成四智之用若昧之則八識起執藏之號七識得染污之名六識起遍計之情五識狥根塵之相若了知賴耶成圓鏡之體持功德之門末那為平等之源一自它之性第六起觀察之妙轉正法之輪五識興所作之功垂應化之迹斯則一心匪動識智自分不轉其體但轉其名不分其理而分其事但伏六識不取塵境故名識滅是故離心之境文理俱虛即識之塵詮量有據狂心不歇歇則菩提垢淨心明本來是佛第九阿陀那識亦名純淨識合論曰寄說阿陀那識此云執持為第九純淨識如五六七八等識常依九識以依止凡愚不了妄執為我如水暴流不離水體諸波浪等以水為依故五六七八識常以淨識為依何謂九為淨識為二乘人久在生死業種六七八識有怖畏故恐彼難信方便於生死種外別立淨識使令悲智漸漸得生達識成智深密經頌云阿陀那識甚微細一切種子如暴流我於凡愚不開演恐彼分別執為我按三身四智諸說採托經論援據詳明與溈仰辨識處大相關係可資深禪正修者不蹈旁蹊而行正路故豫有取焉往往同流之士必謂吾單傳直指之宗何藉此為殊不知學道者為心意識之所困苦甚矣虛明自照本自無它境風搖搖倏然走作通人達士猶未免焉況其下者乎可無方便觀照之力乎倘因其披剝之說破其虛妄搗其窠窟即吾受用處皆大圓鏡智也精金萬鍛不再礦矣石頭參同契雪竇著語新添竺土大仙心誰是能舉東西密相付惜取眉毛人根有利鈍作麼生道無南北祖且欵欵靈源明皎潔撫掌呵呵枝派暗流注亦未相許執事元是迷展開兩手契理亦非悟拈却了也門門一切境捨短從長回互不回互以頭換尾回而更相涉者箇是拄杖子不爾依位住莫錯認定盤星色本殊質像豈便開眸聲元異樂苦還同掩耳暗合上中言心不負人明明清濁句口宜掛壁四大性自復隨所依如子得其母可知也火熱風動搖春氷自消水濕地堅固從旦至暮眼色耳音聲海晏河清鼻香舌鹹醋可憑可據然於一一法重報君依根葉分布好明取本末須歸宗唯我能知尊卑用其語不犯之令當明中有暗暗必可明勿以暗相遇明還非覩當暗中有明一見三勿以明相覩無異說明暗各相對若為分比如前後步不如此萬物自有功旨爾寧止當言用及處縱橫十字事存函蓋合仔細看理應箭鋒拄莫教錯承言須會宗未兆非明勿自立規矩突出難辨觸目不會道又何妨運足焉知路出不惡進步非近遠唱彌高迷隔山河故和彌寡謹白參玄人聞必同歸光陰莫虛度誠哉是言也寂音曰豫嘗深考此書凡四十餘句而以明暗論者半之篇首便曰靈源明皎潔枝派暗流注乃知明暗之意根於此又曰暗合上中言明明清濁句調達開發之也至指其宗而示其趣則曰本末須歸宗尊卑用其語故其下廣序明暗之句奕奕綴聯不已者非決色法虛誑乃是明其語耳洞山悟本得此旨故有五位偏正之說至於臨濟之句中玄雲門之隨波逐浪無異味也而晚輩承其言便想像明暗之中有相藏露之地不亦謬乎五問此蓋當時義學之徒相與造說誣罔先聖非毀禪宗而自聰禪師問達觀頴和尚凡五問欲杜邪謬故辨詳之僧自聰問達觀頴和尚曰諸經論家多言西天自迦葉至師子尊者祖師相傳至此斷絶其實如何答曰吁如此說者生滅心也不知為法惜人螢鬪杲日雀填滄海枉勞形耳且二十四祖師子尊者度婆舍斯多兼出達磨達其緣具在唐會稽沙門靈徹序金陵沙門法炬所編寶林傳并據前魏天竺三藏支疆梁樓續法記具明師子尊者遇難以前傳衣付法之事從大迦葉為首直下血脈第二十五祖婆舍斯多二十六祖不如密多二十七祖般若多羅付菩提達磨即唐土初祖也原支疆梁樓三藏來震旦抵洛陽白馬寺時即前魏帝道卿公景元二年辛巳歲也師子入滅方二年矣以是顯知經論諸師誣罔後昆吁哉奈何問曰達磨大師自西天帶楞伽經四卷來是否答曰非也好事者為之耳且達磨單傳心印不立文字直指人心見性成佛豈有四卷經耶聰曰寶林傳亦如是說頴曰編修者不暇詳討矣試為子評之夫楞伽經三譯而初譯四卷乃宋天竺三藏求那跋陀之所譯次十卷元魏時菩提流支譯流支與達磨同時下藥以毒達磨者是也後七卷唐天后代於闐三藏實叉難陀譯以此證之先後虛實可知矣仰山寂禪師亦嘗辨此其事甚明問曰傳法偈無翻譯暨付法藏傳中無此偈以致諸家多說無據願垂至誨答曰噫子孫支分是非蜂起不能根究耳只如達磨未入此土已會唐言何以知之初見梁武時對問其事即可知矣後又二祖可大師十年侍奉以至立雪斷臂志求祖乘至勤誠矣後達磨告曰吾有一袈裟付汝為信世必有疑者云吾西天之人子此土之子得法實信汝當以吾言證之又云自釋迦聖師至般若多羅以及於吾皆傳衣表法傳法留偈吾今付汝偈曰吾本來茲土傳法救迷情一花開五葉結果自然成因引從上諸祖偈一一授之內傳法印以契證心外付袈裟以定宗旨以此則知達磨付二祖決矣此乃單傳口授何暇翻譯哉問曰天台尊者一心三觀法門與祖師意如何答曰子若不問吾難以言也吾嘗見教中云吾有正法眼藏付囑大迦葉且不在三乘五教之內原佛祖之教皆有傳授昔聞大師於藏中得龍樹所造中論覽至第四卷破諸法性有定性則無因果等事如頌曰因緣所生法我說即是空亦名為假名亦名中道義次頌云未曾有一法不從因緣生是故一切法無不是空者繇此述一心三觀曰空曰假曰中若據教意大凡一偈皆有四句以成其意耳智者離為三觀似枝蔓又未詳傳授因此便言遠稟龍樹以樹為祖近稟思大則可知矣若間世承稟吾恐後世必有聰利之人空看佛經自稟釋迦豈其然乎良繇智者具大福德智慧辨才纍為帝師故成一家之說辭博理微而後世子孫稱傳祖教乃番毀師子尊者親付法與婆舍斯多以至此土六祖傳衣付法以為邪解嗚呼吾若備論即成是非子自詳之問曰自達磨至此土因何諸祖師言教與西天諸祖洎六祖已上不同牛頭一宗北秀荷澤南嶽讓青原思言句漸異見解差殊各黨師門互毀盛至如何得息諍去答曰怪哉此問且祖師來此土如一樹子就地下種因緣和合而生芽也種即達磨并二祖也枝葉即道副總持道育之徒也洎二祖為種三祖為芽乃至六祖為種南嶽讓為芽也其牛頭神秀荷澤等皆枝葉耳然六祖下枝葉繁茂生子亦多其種又逐風土所宜採取得葉貴葉得枝貴枝亦猶樹焉在南為橘在北為枳雖形味有變而根本豈變乎又類日焉在東為朝在西為暮日亦逐方而轉則輪影也其空則不轉必矣得何怪哉子但了其內心莫隨其外法內心者脫其生死外法者逐其愛惡愛惡生則去佛祖遠矣為子等間籤出正宗及橫枝言句各於後述其繇序令學者明其嫡庶者矣覺夢堂重校五家宗派序皇朝景德間吳僧道原集傳燈三十卷自曹溪下列為兩派一曰南嶽讓讓出馬大師一曰青原思思出石頭遷自兩派下又分五宗馬大師出八十四員善知識內有百丈海出黃蘗運大溈祐二人運下出臨濟玄故號臨濟宗祐下出大仰寂故號溈仰宗八十四人又有天王悟悟得龍潭信信得德山鑒鑒得雪峯存存下出雲門宗法眼宗石頭遷出藥山儼天皇悟二人悟下得慧真真得幽間間得文賁便絶唯藥山得雲巖晟晟得洞山價價得曹山寂是為曹洞宗今傳燈却收雲門法眼兩宗歸石頭下誤矣緣同時道悟有兩人一曰江陵城西天王寺道悟者渚宮人崔子玉之後嗣馬祖元和十三年四月十三日化正議大夫丘玄素撰塔銘文幾千言其略云馬祖祝曰他日莫離舊處故還渚宮一曰江陵城東天皇寺道悟婺州東陽人姓張氏嗣石頭元和二年丁亥化律師符載所撰碑二碑所載生緣出處甚詳但緣道原採集傳燈之日非一一親往討尋不過宛轉托人捃拾而得其差誤可知也自景德至今天下四海以傳燈為據雖列剎據位立宗者不能略加究辨唯丞相無盡居士及呂夏卿二君子每會議宗門中事嘗曰石頭得藥山山得曹洞一宗教理行果言說宛轉且天王道悟下出個周金剛呵風罵雨雖佛祖不敢嬰其鋒恐自天皇或有差誤寂音尊者亦嘗疑之云道悟似有兩人無盡後於達觀頴處得唐符載所撰天皇道悟塔記又討得丘玄素所作天王道悟塔記齎以遍示諸方曰吾嘗疑德山洞山同出石頭下因甚垂手處死活不同今以丘符二記證之朗然明白方知吾擇法驗人之不謬耳寂音曰圭峯答裴相國宗趣狀列馬祖之嗣六人首曰江陵道悟其下注曰兼稟徑山今妄以雲門臨濟二宗競者可發一笑略書梗概以傳明達者庶知五家之正派如是而已
