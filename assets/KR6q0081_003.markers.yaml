  - {type: variant, offset: 4457, length: 154, content: '永嘉欽功勳五位

      到處相逢元不識。有時不識却相逢。師襄無目還如見。師曠能聰恰似聾向。

      金針密密綉鴛鴦。錦縫綿綿玉線長。挂向春園人不識。引他蜂蝶過來忙奉。

      顏生陋巷不堪憂。終日如愚樂自繇。謾說坐忘為益矣。累他尼父一場愁功。

      淮南道士著真紅。勿謂情忘色是空。醮罷玉壇移斗柄。步虛一曲對春風共功。

      漢高初起沛豐間。三尺龍泉帝業安。待得叔孫成禮樂。元來不共汝同盤功功。', 甲: ''}
