  - {type: variant, offset: 1676, length: 123, content: '浮山遠

      正中偏。空劫迢迢本寂然。金剛際下翻筋斗。

      掌上靈機遍大千。

      偏中正。浩浩塵中劫清淨。臨岐撒手便回途。

      無影堂前提正令。

      正中來。頂後圓光耀古臺。雖然照徹人間世。

      不犯鋒鋩絕點埃。

      兼中至。妙用縱橫休擬議。始終交戰自玄玄。

      壁立神鋒皆猛利。

      兼中到。格外明機長節操。了知萬彙不能該。

      誰能更守於玄奧。', 甲: ''}
