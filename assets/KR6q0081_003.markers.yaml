  - {type: variant, offset: 7567, length: 105, content: '古德分三種功勳新增

      正位一色正位一色

      無影林中鳥不棲。空階密密向邊遲。寒巖荒草何曾綠。正坐堂堂失路迷。

      大功一色大功一色

      白牛雪裏覓無蹤。功盡超然體浩融。月影蘆花天未曉。靈苗任運剪春風。

      今時一色今時一色

      髑髏識盡勿多般。狗口纔開落二三。日用光中須急薦。青山只在白雲間。', 甲: ''}
