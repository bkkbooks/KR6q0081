  - {type: variant, offset: 4519, length: 53, content: '海印信

      我手佛手。誰人不有。直下分明。何須狂走。

      我脚驢脚。高低踏著。雨過苔青。雲開日爍。

      問爾生緣。處處不疑。直語心無病。誰論是與非。', 甲: ''}
