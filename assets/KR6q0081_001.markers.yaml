  - {type: variant, offset: 6970, length: 30, content: '大慧

      兔角龜毛眼裏栽＝裁【甲】栽【大】，裁【甲】栽裁。鐵山當面勢崔嵬。東西南北無門入。曠劫無明當下灰。', 甲: 竹庵十智同真選佛科汾陽佛法苦無多愛心竭盡尋真智面目分明見也麼}
