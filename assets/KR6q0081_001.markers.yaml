  - {type: variant, offset: 6940, length: 30, content: '竹庵

      甲本此頌無以卷末所載十年海上等之頌代之 cf. P. 306c十智同真選佛科。汾陽佛法苦無多。愛心竭盡尋真智。面目分明見也麼。', 甲: 大慧兔角龜毛眼裏栽鐵山當面勢崔嵬東西南北無門入曠劫無明當下灰}
