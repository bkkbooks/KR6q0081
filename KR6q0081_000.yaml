body:
  text: 人天眼目序豫遊方時所至盡誠咨扣尊宿五宗綱要其間件目往往亦有所未知者因慨念既據師位而綱宗語句尚不知其名況旨訣乎將何以啓迪後昆剔抉疑膜邪於是有意於綱要幾二十年矣或見於遺編或得於斷碣或聞尊宿稱提或獲老衲垂頌凡是五宗綱要者即筆而藏諸雖成巨軸第未暇詳定晚抵天台萬年山寺始償其志編次類列分為五宗名之曰人天眼目其辭皆一依前輩所作弗敢增損然是集也乃從上諸大老利物施為既非豫胸臆之論俾行於世有何誚焉若其執拂柄據師位者外是則無以辨驗邪正也有識博聞者必垂印可宋淳熙戊申季冬越山晦巖智昭序
